services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: legal-ai-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db
    volumes:
      - ./apps/backend:/app
      - document_storage:/app/storage
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: legal-ai-frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    command: npm run dev

  worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.worker
    container_name: legal-ai-worker
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - document_storage:/app/storage
    command: python workers/document_processor/doc_worker.py

  redis:
    image: redis:7-alpine
    container_name: legal-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  db:
    image: postgres:15-alpine
    container_name: legal-ai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lilian
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  document_storage:
  postgres_data:
